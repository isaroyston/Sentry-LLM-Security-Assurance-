<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGBank Withdrawal Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>SGBank Withdrawal Assistant</h1>
            <p>Live Chatbot Connection</p>
        </header>
        
        <div id="chat-messages" class="chat-messages">
            <div class="message assistant">
                Hello! I am your SGBank Assistant. How help you today?
            </div>
        </div>

        <form id="chat-form" class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
